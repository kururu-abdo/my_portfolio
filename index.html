
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdalarahim Hassan — Portfolio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --purple:#8b5cf6;--purple2:#a78bfa;--purple3:#6d28d9;
  --cyan:#06b6d4;--cyan2:#22d3ee;
  --text:#f1f0fb;--text2:#a09ec0;--text3:#6b6890;
  --border:#2a2840;--border2:#3d3a5c;
  --glow:0 0 20px rgba(139,92,246,.3);
  --glow2:0 0 40px rgba(139,92,246,.15);
  --radius:12px;--radius2:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--purple2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--text2);text-decoration:none;font-size:.9rem;transition:color .2s}
.nav-links a:hover{color:var(--purple2)}
.nav-admin{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:.4rem 1rem;border-radius:var(--radius2);cursor:pointer;font-size:.85rem;transition:all .2s}
.nav-admin:hover{border-color:var(--purple);color:var(--purple2)}

/* SECTIONS */
section{min-height:100vh;padding:6rem 2rem 4rem;max-width:1100px;margin:0 auto}

/* HERO */
#hero{display:flex;align-items:center;gap:4rem;padding-top:8rem}
.hero-text{flex:1}
.hero-eyebrow{font-size:.85rem;letter-spacing:.15em;color:var(--cyan2);text-transform:uppercase;margin-bottom:1rem}
.hero-name{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;line-height:1.05;margin-bottom:1rem}
.hero-name span{background:linear-gradient(135deg,var(--purple2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-role{font-size:1.2rem;color:var(--text2);margin-bottom:.5rem}
.hero-loc{font-size:.95rem;color:var(--text3);margin-bottom:2rem}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,var(--purple3),var(--purple));color:#fff;border:none;padding:.75rem 1.75rem;border-radius:var(--radius2);cursor:pointer;font-size:.95rem;font-weight:600;transition:all .2s;box-shadow:var(--glow);text-decoration:none;display:inline-block}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(139,92,246,.5)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text);padding:.75rem 1.75rem;border-radius:var(--radius2);cursor:pointer;font-size:.95rem;transition:all .2s;text-decoration:none;display:inline-block}
.btn-outline:hover{border-color:var(--purple);color:var(--purple2);background:rgba(139,92,246,.08)}
.hero-photo-wrap{position:relative;flex-shrink:0}
.hero-photo{width:280px;height:280px;border-radius:24px;object-fit:cover;position:relative;z-index:1;border:2px solid var(--border2)}
.hero-glow{position:absolute;inset:-20px;background:radial-gradient(circle,rgba(139,92,246,.3) 0%,transparent 70%);filter:blur(20px);z-index:0}
.hero-badges{display:flex;gap:.75rem;margin-top:1.5rem;flex-wrap:wrap}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:.3rem .85rem;font-size:.8rem;color:var(--text2);display:flex;align-items:center;gap:.4rem}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--purple2)}

/* BENTO GRID for stats */
.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:3rem}
.bento-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;transition:all .25s}
.bento-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--glow2)}
.bento-num{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--purple2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bento-label{font-size:.8rem;color:var(--text3);margin-top:.25rem}

/* ABOUT */
#about{min-height:auto;padding:5rem 2rem}
.section-title{font-size:2rem;font-weight:700;margin-bottom:.5rem}
.section-title span{background:linear-gradient(135deg,var(--purple2),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.section-line{width:60px;height:3px;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:2px;margin-bottom:2rem}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.about-text p{color:var(--text2);line-height:1.8;margin-bottom:1rem;font-size:.97rem}
.about-stack{display:flex;flex-direction:column;gap:.75rem}
.stack-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem;transition:all .2s}
.stack-item:hover{border-color:var(--purple);box-shadow:var(--glow2)}
.stack-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.stack-name{font-size:.9rem;font-weight:600}
.stack-sub{font-size:.78rem;color:var(--text3)}

/* TECH STACK */
#tech{min-height:auto;padding:5rem 2rem}
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:1rem;margin-top:2rem}
.tech-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem;text-align:center;transition:all .25s;cursor:default}
.tech-card:hover{border-color:var(--purple2);transform:translateY(-4px);box-shadow:var(--glow)}
.tech-emoji{font-size:2rem;margin-bottom:.5rem;display:block}
.tech-name{font-size:.82rem;font-weight:600;color:var(--text)}
.tech-cat{font-size:.72rem;color:var(--text3);margin-top:.2rem}

/* EXPERIENCE TIMELINE */
#experience{min-height:auto;padding:5rem 2rem}
.timeline{position:relative;padding-left:2rem}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--purple),var(--cyan),transparent)}
.tl-item{position:relative;padding-bottom:2.5rem;padding-left:1.5rem}
.tl-dot{position:absolute;left:-2.5rem;top:.35rem;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--cyan));box-shadow:0 0 12px rgba(139,92,246,.5)}
.tl-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;transition:all .25s}
.tl-card:hover{border-color:var(--border2);box-shadow:var(--glow2)}
.tl-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem}
.tl-role{font-size:1rem;font-weight:700}
.tl-date{font-size:.8rem;color:var(--cyan2);background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2);padding:.2rem .6rem;border-radius:20px}
.tl-company{font-size:.88rem;color:var(--purple2);margin-bottom:.75rem;font-weight:500}
.tl-bullets{list-style:none}
.tl-bullets li{font-size:.875rem;color:var(--text2);padding:.3rem 0 .3rem 1rem;position:relative;line-height:1.6}
.tl-bullets li::before{content:'▸';position:absolute;left:0;color:var(--purple2)}

/* PROJECTS */
#projects{min-height:auto;padding:5rem 2rem}
.proj-filters{display:flex;gap:.75rem;margin-bottom:2rem;flex-wrap:wrap}
.filter-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:.4rem 1rem;border-radius:20px;cursor:pointer;font-size:.82rem;transition:all .2s}
.filter-btn.active,.filter-btn:hover{border-color:var(--purple);color:var(--purple2);background:rgba(139,92,246,.1)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
.proj-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .25s;cursor:pointer}
.proj-card:hover{border-color:var(--purple2);transform:translateY(-4px);box-shadow:0 8px 32px rgba(139,92,246,.2)}
.proj-header{padding:1.25rem 1.25rem .75rem;display:flex;justify-content:space-between;align-items:flex-start}
.proj-cat-badge{font-size:.72rem;padding:.25rem .6rem;border-radius:12px;font-weight:600}
.cat-flutter{background:rgba(6,182,212,.15);color:var(--cyan2);border:1px solid rgba(6,182,212,.25)}
.cat-android{background:rgba(139,92,246,.15);color:var(--purple2);border:1px solid rgba(139,92,246,.25)}
.cat-ios{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.cat-cross{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.proj-links{display:flex;gap:.5rem}
.proj-link{width:28px;height:28px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text3);text-decoration:none;font-size:.8rem;transition:all .2s}
.proj-link:hover{border-color:var(--purple);color:var(--purple2)}
.proj-body{padding:0 1.25rem 1.25rem}
.proj-title{font-size:1rem;font-weight:700;margin-bottom:.5rem}
.proj-desc{font-size:.82rem;color:var(--text2);line-height:1.6;margin-bottom:.75rem}
.proj-tech{display:flex;flex-wrap:wrap;gap:.4rem}
.tech-pill{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:.15rem .5rem;font-size:.72rem;color:var(--text3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:2rem}
.modal-close{float:right;background:var(--bg4);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-close:hover{border-color:var(--purple);color:var(--purple2)}
.modal-cat{margin-bottom:1rem}
.modal-title{font-size:1.5rem;font-weight:800;margin-bottom:.75rem;clear:both}
.modal-desc{color:var(--text2);line-height:1.8;margin-bottom:1rem;font-size:.93rem}
.modal-section{font-size:.82rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;margin-top:1rem}
.modal-bullets{list-style:none}
.modal-bullets li{font-size:.875rem;color:var(--text2);padding:.35rem 0 .35rem 1.25rem;position:relative;line-height:1.6;border-bottom:1px solid var(--border)}
.modal-bullets li:last-child{border-bottom:none}
.modal-bullets li::before{content:'✦';position:absolute;left:0;color:var(--purple2);font-size:.65rem;top:.5rem}
.modal-links{display:flex;gap:.75rem;margin-top:1.5rem;flex-wrap:wrap}
.modal-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);color:var(--purple2);padding:.5rem 1.1rem;border-radius:var(--radius2);text-decoration:none;font-size:.85rem;transition:all .2s}
.modal-link:hover{background:rgba(139,92,246,.2)}

/* CONTACT */
#contact{min-height:auto;padding:5rem 2rem 8rem;text-align:center}
.contact-sub{color:var(--text2);margin:.75rem auto 2.5rem;max-width:480px;line-height:1.7}
.contact-cards{display:flex;justify-content:center;gap:1.25rem;flex-wrap:wrap}
.contact-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem 2rem;transition:all .25s;text-decoration:none;min-width:160px;text-align:center}
.contact-card:hover{border-color:var(--purple);transform:translateY(-3px);box-shadow:var(--glow2)}
.contact-card-icon{font-size:1.75rem;margin-bottom:.5rem}
.contact-card-label{font-size:.82rem;color:var(--text3);margin-bottom:.25rem}
.contact-card-val{font-size:.9rem;color:var(--purple2);font-weight:500}

/* ADMIN */
#admin-screen{background:var(--bg);min-height:100vh;padding:2rem}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.admin-title{font-size:1.5rem;font-weight:700}
.admin-grid{display:grid;grid-template-columns:1fr 1.5fr;gap:2rem}
.admin-form-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.admin-form-title{font-size:1rem;font-weight:600;margin-bottom:1.25rem;color:var(--purple2)}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:.8rem;color:var(--text3);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:.6rem .85rem;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--purple)}
.form-select{appearance:none}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.admin-submit{background:linear-gradient(135deg,var(--purple3),var(--purple));color:#fff;border:none;padding:.65rem 1.5rem;border-radius:var(--radius2);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;width:100%;margin-top:.5rem}
.admin-submit:hover{opacity:.9;transform:translateY(-1px)}
.admin-projects-list{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.admin-proj-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.admin-proj-info{}
.admin-proj-name{font-size:.92rem;font-weight:600;margin-bottom:.25rem}
.admin-proj-cat{font-size:.75rem;color:var(--text3)}
.admin-proj-actions{display:flex;gap:.5rem;flex-shrink:0}
.btn-sm{padding:.3rem .7rem;border-radius:6px;cursor:pointer;font-size:.78rem;border:1px solid var(--border);background:var(--bg4);color:var(--text2);transition:all .2s}
.btn-sm:hover{border-color:var(--purple);color:var(--purple2)}
.btn-sm.danger:hover{border-color:#ef4444;color:#ef4444}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:2.5rem;width:100%;max-width:380px}
.login-title{font-size:1.3rem;font-weight:700;margin-bottom.5rem;text-align:center}
.login-sub{color:var(--text3);font-size:.85rem;text-align:center;margin-bottom:1.75rem}
.login-error{color:#ef4444;font-size:.82rem;margin-bottom:.75rem;background:rgba(239,68,68,.1);padding:.5rem .75rem;border-radius:6px;border:1px solid rgba(239,68,68,.2)}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s ease forwards}
</style>
</head>

// State
let page = 'portfolio'; // 'portfolio' | 'login' | 'admin'
let loggedIn = false;
let projects = JSON.parse(localStorage.getItem('portfolio_projects') || 'null') || INITIAL_PROJECTS;
let nextId = Math.max(...projects.map(p=>p.id)) + 1;
let filter = 'All';
let modal = null;

function saveProjects(){localStorage.setItem('portfolio_projects', JSON.stringify(projects));}

function catClass(c){
  if(c==='Flutter') return 'cat-flutter';
  if(c==='Android') return 'cat-android';
  if(c==='iOS') return 'cat-ios';
  return 'cat-cross';
}

function render(){
  const root = document.getElementById('root');
  if(page==='login'){root.innerHTML = renderLogin(); bindLogin(); return;}
  if(page==='admin'){root.innerHTML = renderAdmin(); bindAdmin(); return;}
  root.innerHTML = renderPortfolio();
  bindPortfolio();
}

function renderLogin(){
  return `<div class="login-wrap">
    <div class="login-card">
      <div class="login-title" style="text-align:center;font-size:1.3rem;font-weight:700;margin-bottom:.35rem">Admin Panel</div>
      <div class="login-sub">Enter your credentials to continue</div>
      <div id="login-err" style="display:none" class="login-error">Incorrect password</div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="pw" placeholder="Enter admin password" /></div>
      <button class="admin-submit" id="login-btn">Sign in</button>
      <button class="btn-outline" onclick="page='portfolio';render()" style="width:100%;margin-top:.75rem;text-align:center">← Back to Portfolio</button>
    </div>
  </div>`;
}

function bindLogin(){
  document.getElementById('login-btn').onclick = () => {
    const pw = document.getElementById('pw').value;
    if(pw==='admin123'){loggedIn=true;page='admin';render();}
    else{document.getElementById('login-err').style.display='block';}
  };
  document.getElementById('pw').addEventListener('keyup',e=>{if(e.key==='Enter')document.getElementById('login-btn').click();});
}

function renderAdmin(){
  const editProj = editingId ? projects.find(p=>p.id===editingId) : null;
  return `<div id="admin-screen">
    <div class="admin-header">
      <div class="admin-title">⚡ Admin Dashboard</div>
      <div style="display:flex;gap:.75rem">
        <button class="btn-sm" onclick="page='portfolio';render()">← Portfolio</button>
        <button class="btn-sm" onclick="loggedIn=false;page='login';render()">Sign out</button>
      </div>
    </div>
    <div class="admin-grid">
      <div class="admin-form-section">
        <div class="admin-form-title">${editProj?'✏️ Edit Project':'+ Add New Project'}</div>
        <div class="form-group"><label class="form-label">Project Title</label><input class="form-input" id="f-title" value="${editProj?editProj.title:''}" placeholder="My Awesome App" /></div>

        <div class="form-group"><label class="form-label">Key Highlights (one per line)</label><textarea class="form-textarea" id="f-hl" style="min-height:100px">${editProj?editProj.highlights.join('\n'):''}</textarea></div>
        <button class="admin-submit" id="save-btn">${editProj?'Update Project':'Add Project'}</button>
        ${editProj?`<button class="btn-sm" style="width:100%;margin-top:.5rem" onclick="editingId=null;render()">Cancel</button>`:''}
      </div>
      <div class="admin-projects-list">

  </div>`;

function bindAdmin(){
  document.getElementById('save-btn').onclick = () => {
    const title = document.getElementById('f-title').value.trim();
    if(!title) return;
    const obj = {
      id: editingId || nextId++,
      title,
      category: document.getElementById('f-cat').value,
      tech: document.getElementById('f-tech').value.split(',').map(s=>s.trim()).filter(Boolean),
      desc: document.getElementById('f-desc').value.trim(),
      github: document.getElementById('f-gh').value.trim(),
      store: document.getElementById('f-store').value.trim(),
      highlights: document.getElementById('f-hl').value.split('\n').map(s=>s.trim()).filter(Boolean)
    };
    if(editingId){projects = projects.map(p=>p.id===editingId?obj:p);editingId=null;}
    else{projects.push(obj);}
    saveProjects(); render();
  };
  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.onclick = ()=>{editingId=parseInt(btn.dataset.edit);render();};
  });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = ()=>{
      if(confirm('Delete this project?')){
        projects = projects.filter(p=>p.id!==parseInt(btn.dataset.del));
        saveProjects(); render();
      }
    };
  });
}

function renderModal(){
  const p = projects.find(pr=>pr.id===modal);
  if(!p) return '';
  return `<div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-cat"><span class="proj-cat-badge ${catClass(p.category)}">${p.category}</span></div>
      <div class="modal-title">${p.title}</div>
      <div class="modal-desc">${p.desc}</div>
      <div class="modal-section">Key Highlights</div>
      <ul class="modal-bullets">${p.highlights.map(h=>`<li>${h}</li>`).join('')}</ul>
      <div class="modal-section">Tech Stack</div>
      <div class="proj-tech" style="margin-top:.5rem">${p.tech.map(t=>`<span class="tech-pill">${t}</span>`).join('')}</div>
      <div class="modal-links">
        ${p.github?`<a href="${p.github}" target="_blank" class="modal-link">GitHub →</a>`:''}
        ${p.store?`<a href="${p.store}" target="_blank" class="modal-link">App Store / Play Store →</a>`:''}
      </div>
    </div>
  </div>`;
}

function bindPortfolio(){
  document.getElementById('nav-admin-btn').onclick = () => {
    if(loggedIn){page='admin';render();}
    else{page='login';render();}
  };
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.onclick = ()=>{filter=btn.dataset.cat;render();};
  });
  document.querySelectorAll('.proj-card').forEach(card=>{
    card.onclick = ()=>{modal=parseInt(card.dataset.pid);render();};
  });
  if(modal){
    document.getElementById('modal-close').onclick = ()=>{modal=null;render();};
    document.getElementById('modal-overlay').onclick = (e)=>{if(e.target.id==='modal-overlay'){modal=null;render();}};
  }
}
